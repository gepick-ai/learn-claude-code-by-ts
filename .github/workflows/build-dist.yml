name: build-dist

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build client dist
        run: bun run -F '@gepick/client' build

      - name: Upload client dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: ./packages/client/dist

  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build server dist
        run: bun run -F '@gepick/app' build

      - name: Upload server dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: ./packages/app/dist
