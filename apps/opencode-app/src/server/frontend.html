<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SDK Agent Web App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html {
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100dvh;
            max-height: 100dvh;
            min-height: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: #1a1a2e;
            color: #eee;
        }
        .header {
            flex-shrink: 0;
            padding: 1rem 2rem;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
        }
        .header h1 { font-size: 1.25rem; }
        .chat-container {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 1rem 1rem 0;
        }
        .messages {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 0 0 1rem;
            -webkit-overflow-scrolling: touch;
        }
        .message {
            margin-bottom: 1rem;
            padding: 1rem;
            border-radius: 8px;
            max-width: 80%;
            white-space: pre-wrap;
        }
        .message.user {
            background: #0f3460;
            margin-left: auto;
        }
        .message.assistant {
            background: #16213e;
            margin-right: auto;
        }
        .message.tool {
            background: #0d2137;
            margin-right: auto;
            font-size: 0.85rem;
            color: #a8c;
            max-width: 90%;
        }
        .message.reasoning {
            background: #1a2744;
            margin-right: auto;
            font-size: 0.9rem;
            color: #9ab;
            font-style: italic;
            max-width: 90%;
        }
        .input-area {
            flex-shrink: 0;
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem 0 1rem;
            background: #1a1a2e;
        }
        .input-area input {
            flex: 1;
            padding: 1rem;
            border: 1px solid #0f3460;
            border-radius: 8px;
            background: #16213e;
            color: #eee;
            font-size: 1rem;
        }
        .input-area input:focus {
            outline: none;
            border-color: #e94560;
        }
        .input-area button {
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            background: #e94560;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }
        .input-area button:hover {
            background: #ff6b6b;
        }
        .input-area button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .loading {
            text-align: center;
            color: #888;
            padding: 1rem;
        }
        .sse-status {
            font-size: 0.75rem;
            color: #666;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>AI SDK Agent Web App</h1>
        <div class="sse-status" id="sseStatus">SSE: 连接中…</div>
    </div>
    <div class="chat-container">
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="输入消息..." disabled>
            <button id="sendBtn" disabled>发送</button>
        </div>
    </div>

    <script>
        const SESSION_STORAGE_KEY = 'opencode-app.sessionId';

        let sessionId = null;
        /** 当前一次发送中，首条 part 的 messageId 视为用户消息，其余为助理回复 */
        let turnUserMessageId = null;
        const partEls = new Map();

        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const sseStatusEl = document.getElementById('sseStatus');

        function formatToolPart(part) {
            const t = part.tool || '?';
            const st = part.state && part.state.status;
            if (st === 'completed' && part.state.output != null) {
                return `[tool] ${t} → ${String(part.state.output).slice(0, 200)}`;
            }
            if (st === 'error' && part.state.error) {
                return `[tool] ${t} 错误: ${part.state.error}`;
            }
            return `[tool] ${t} (${st || '—'})`;
        }

        function createPartMessageEl(part) {
            const el = document.createElement('div');
            if (part.type === 'text') {
                el.className = 'message assistant';
            } else if (part.type === 'reasoning') {
                el.className = 'message reasoning';
            } else if (part.type === 'tool') {
                el.className = 'message tool';
            } else {
                el.className = 'message assistant';
            }
            if (part.type === 'text' || part.type === 'reasoning') {
                el.textContent = part.text || '';
            } else if (part.type === 'tool') {
                el.textContent = formatToolPart(part);
            }
            return el;
        }

        function ensurePartElement(part) {
            let el = partEls.get(part.id);
            if (el) return el;
            el = createPartMessageEl(part);
            messagesEl.appendChild(el);
            partEls.set(part.id, el);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return el;
        }

        function renderHistory(sessionMessages) {
            if (!Array.isArray(sessionMessages) || sessionMessages.length === 0) return;
            for (const sm of sessionMessages) {
                const msg = sm.message;
                const parts = sm.parts || [];
                if (msg.role === 'user') {
                    for (const p of parts) {
                        if (p.type === 'text' && !p.ignored) {
                            addMessage(p.text || '', 'user');
                        }
                    }
                } else {
                    for (const p of parts) {
                        if (p.type === 'text' || p.type === 'reasoning' || p.type === 'tool') {
                            messagesEl.appendChild(createPartMessageEl(p));
                        }
                    }
                    if (msg.error) {
                        addMessage('错误: ' + msg.error, 'assistant');
                    }
                }
            }
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        const es = new EventSource('/sse/event');
        es.onopen = () => {
            sseStatusEl.textContent = 'SSE: 已连接';
        };
        es.onerror = () => {
            sseStatusEl.textContent = 'SSE: 断开（将自动重连）';
        };
        es.onmessage = (ev) => {
            let o;
            try {
                o = JSON.parse(ev.data);
            } catch {
                return;
            }
            const t = o.type;
            const p = o.properties || {};
            if (t === 'server.heartbeat' || t === 'server.connected') return;
            if (sessionId == null) return;

            if (t === 'session.part.updated') {
                const part = p.part;
                if (!part || part.sessionId !== sessionId) return;
                const mid = part.messageId;
                if (mid) {
                    if (turnUserMessageId == null) {
                        turnUserMessageId = mid;
                        return;
                    }
                    if (mid === turnUserMessageId) return;
                }
                if (part.type === 'text' || part.type === 'reasoning') {
                    const el = ensurePartElement(part);
                    el.textContent = part.text || '';
                } else if (part.type === 'tool') {
                    const el = ensurePartElement(part);
                    el.textContent = formatToolPart(part);
                }
                messagesEl.scrollTop = messagesEl.scrollHeight;
                return;
            }

            if (t === 'session.part.delta') {
                if (p.sessionId !== sessionId) return;
                if (p.field !== 'text') return;
                const mid = p.messageId;
                if (mid) {
                    if (turnUserMessageId == null) {
                        turnUserMessageId = mid;
                        return;
                    }
                    if (mid === turnUserMessageId) return;
                }
                let el = partEls.get(p.partId);
                if (!el) {
                    el = document.createElement('div');
                    el.className = 'message assistant';
                    el.textContent = p.delta || '';
                    messagesEl.appendChild(el);
                    partEls.set(p.partId, el);
                } else {
                    el.textContent += p.delta || '';
                }
                messagesEl.scrollTop = messagesEl.scrollHeight;
                return;
            }
        };

        async function init() {
            const stored = localStorage.getItem(SESSION_STORAGE_KEY);
            if (stored) {
                try {
                    const sRes = await fetch('/session/' + encodeURIComponent(stored));
                    if (sRes.ok) {
                        const mRes = await fetch('/session/' + encodeURIComponent(stored) + '/message');
                        if (mRes.ok) {
                            const list = await mRes.json();
                            sessionId = stored;
                            renderHistory(list);
                        } else {
                            localStorage.removeItem(SESSION_STORAGE_KEY);
                        }
                    } else {
                        localStorage.removeItem(SESSION_STORAGE_KEY);
                    }
                } catch {
                    localStorage.removeItem(SESSION_STORAGE_KEY);
                }
            }
            if (!sessionId) {
                const res = await fetch('/session', { method: 'POST' });
                const data = await res.json();
                sessionId = data.sessionId;
                localStorage.setItem(SESSION_STORAGE_KEY, sessionId);
            }
            inputEl.disabled = false;
            sendBtn.disabled = false;
            inputEl.focus();
        }

        function addMessage(content, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = content;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return div;
        }

        function showLoading() {
            const div = document.createElement('div');
            div.className = 'loading';
            div.id = 'loading';
            div.textContent = '思考中...';
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function hideLoading() {
            const el = document.getElementById('loading');
            if (el) el.remove();
        }

        async function sendMessage() {
            const message = inputEl.value.trim();
            if (!message || !sessionId) return;

            addMessage(message, 'user');
            inputEl.value = '';
            inputEl.disabled = true;
            sendBtn.disabled = true;

            turnUserMessageId = null;
            partEls.clear();

            showLoading();

            try {
                const res = await fetch(`/session/${sessionId}/message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        parts: [{ type: 'text', text: message }]
                    })
                });
                const data = await res.json();
                hideLoading();
                if (!data.success) {
                    addMessage('错误: ' + (data.error || ''), 'assistant');
                }
            } catch (err) {
                hideLoading();
                addMessage('网络错误', 'assistant');
            }

            partEls.clear();
            inputEl.disabled = false;
            sendBtn.disabled = false;
            inputEl.focus();
        }

        sendBtn.addEventListener('click', sendMessage);
        inputEl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        init();
    </script>
</body>
</html>
