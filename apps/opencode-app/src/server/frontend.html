<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SDK Agent Web App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #1a1a2e;
            color: #eee;
        }
        .header {
            padding: 1rem 2rem;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
        }
        .header h1 { font-size: 1.25rem; }
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 1rem;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .message {
            margin-bottom: 1rem;
            padding: 1rem;
            border-radius: 8px;
            max-width: 80%;
            white-space: pre-wrap;
        }
        .message.user {
            background: #0f3460;
            margin-left: auto;
        }
        .message.assistant {
            background: #16213e;
            margin-right: auto;
        }
        .message.tool {
            background: #0d2137;
            margin-right: auto;
            font-size: 0.85rem;
            color: #a8c;
            max-width: 90%;
        }
        .input-area {
            display: flex;
            gap: 0.5rem;
        }
        .input-area input {
            flex: 1;
            padding: 1rem;
            border: 1px solid #0f3460;
            border-radius: 8px;
            background: #16213e;
            color: #eee;
            font-size: 1rem;
        }
        .input-area input:focus {
            outline: none;
            border-color: #e94560;
        }
        .input-area button {
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            background: #e94560;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }
        .input-area button:hover {
            background: #ff6b6b;
        }
        .input-area button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .loading {
            text-align: center;
            color: #888;
            padding: 1rem;
        }
        .sse-status {
            font-size: 0.75rem;
            color: #666;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>AI SDK Agent Web App</h1>
        <div class="sse-status" id="sseStatus">SSE: 连接中…</div>
    </div>
    <div class="chat-container">
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="输入消息..." disabled>
            <button id="sendBtn" disabled>发送</button>
        </div>
    </div>

    <script>
        let sessionId = null;
        let assistantStreamEl = null;
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const sseStatusEl = document.getElementById('sseStatus');

        const es = new EventSource('/sse/event');
        es.onopen = () => {
            sseStatusEl.textContent = 'SSE: 已连接';
        };
        es.onerror = () => {
            sseStatusEl.textContent = 'SSE: 断开（将自动重连）';
        };
        es.onmessage = (ev) => {
            let o;
            try {
                o = JSON.parse(ev.data);
            } catch {
                return;
            }
            const t = o.type;
            const p = o.properties || {};
            if (t === 'server.heartbeat' || t === 'server.connected') return;
            if (p.sessionId != null && sessionId != null && p.sessionId !== sessionId) return;

            if (t === 'message.delta' && assistantStreamEl) {
                assistantStreamEl.textContent += p.text || '';
                messagesEl.scrollTop = messagesEl.scrollHeight;
            }
            if (t === 'tool.call') {
                const div = document.createElement('div');
                div.className = 'message tool';
                div.textContent = `[tool] ${p.name}`;
                messagesEl.appendChild(div);
                messagesEl.scrollTop = messagesEl.scrollHeight;
            }
            if (t === 'session.error') {
                const div = document.createElement('div');
                div.className = 'message assistant';
                div.textContent = '错误: ' + (p.message || '');
                messagesEl.appendChild(div);
            }
        };

        async function init() {
            const res = await fetch('/session', { method: 'POST' });
            const data = await res.json();
            sessionId = data.sessionId;
            inputEl.disabled = false;
            sendBtn.disabled = false;
            inputEl.focus();
        }

        function addMessage(content, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = content;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return div;
        }

        function showLoading() {
            const div = document.createElement('div');
            div.className = 'loading';
            div.id = 'loading';
            div.textContent = '思考中...';
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function hideLoading() {
            const el = document.getElementById('loading');
            if (el) el.remove();
        }

        async function sendMessage() {
            const message = inputEl.value.trim();
            if (!message || !sessionId) return;

            addMessage(message, 'user');
            inputEl.value = '';
            inputEl.disabled = true;
            sendBtn.disabled = true;

            assistantStreamEl = document.createElement('div');
            assistantStreamEl.className = 'message assistant';
            assistantStreamEl.textContent = '';
            messagesEl.appendChild(assistantStreamEl);
            messagesEl.scrollTop = messagesEl.scrollHeight;

            showLoading();

            try {
                const res = await fetch(`/session/${sessionId}/message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        parts: [{ type: 'text', text: message }]
                    })
                });
                const data = await res.json();
                hideLoading();
                if (data.success) {
                    // SSE already streamed assistant content.
                } else {
                    if (assistantStreamEl) {
                        assistantStreamEl.textContent = '错误: ' + (data.error || '');
                    }
                }
            } catch (err) {
                hideLoading();
                if (assistantStreamEl) {
                    assistantStreamEl.textContent = '网络错误';
                }
            }

            assistantStreamEl = null;
            inputEl.disabled = false;
            sendBtn.disabled = false;
            inputEl.focus();
        }

        sendBtn.addEventListener('click', sendMessage);
        inputEl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        init();
    </script>
</body>
</html>
